name: Deploy NEAR Contract

on:
  workflow_dispatch:
    inputs:
      master_account:
        description: 'Your NEAR testnet account (e.g. chandanapt.testnet)'
        required: true
        default: 'chandanapt.testnet'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install near-sdk-js
        run: npm install -g near-sdk-js

      - name: Build contract WASM
        run: |
          npx near-sdk-js build contracts/private_stream_near.js \
            --out contracts/private_stream_near.wasm
          echo "Contract built successfully"
          ls -la contracts/private_stream_near.wasm

      - name: Install NEAR CLI
        run: npm install -g near-cli

      - name: Setup NEAR credentials
        run: |
          mkdir -p ~/.near-credentials/testnet
          echo '${{ secrets.NEAR_CREDENTIALS }}' > ~/.near-credentials/testnet/chandanapt.testnet.json
          # Also write sub-account credentials
          echo '${{ secrets.NEAR_CONTRACT_CREDENTIALS }}' > ~/.near-credentials/testnet/privatestream.chandanapt.testnet.json
          echo "Credentials written"
          cat ~/.near-credentials/testnet/chandanapt.testnet.json | python3 -c "import json,sys; d=json.load(sys.stdin); print('account_id:', d['account_id'])"

      - name: Set RPC URL
        run: |
          echo "NEAR_CLI_TESTNET_RPC_SERVER_URL=https://testnet.rpc.fastnear.com" >> $GITHUB_ENV

      - name: Verify master account exists
        run: |
          curl -s -X POST https://testnet.rpc.fastnear.com \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":"1","method":"query","params":{"request_type":"view_account","finality":"final","account_id":"chandanapt.testnet"}}' \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('Balance:', int(d['result']['amount']) / 10**24, 'NEAR') if 'result' in d else print('Error:', d)"

      - name: Deploy contract
        run: |
          CONTRACT_ACCOUNT="privatestream.chandanapt.testnet"
          MASTER="chandanapt.testnet"
          NEAR_CLI_TESTNET_RPC_SERVER_URL=https://testnet.rpc.fastnear.com \
          near deploy \
            --accountId $CONTRACT_ACCOUNT \
            --wasmFile contracts/private_stream_near.wasm \
            --networkId testnet
          echo "Contract deployed to: $CONTRACT_ACCOUNT"

      - name: Initialize contract
        run: |
          CONTRACT_ACCOUNT="privatestream.chandanapt.testnet"
          MASTER="chandanapt.testnet"
          NEAR_CLI_TESTNET_RPC_SERVER_URL=https://testnet.rpc.fastnear.com \
          near call $CONTRACT_ACCOUNT init \
            "{\"treasuryAccount\":\"$MASTER\",\"nearPriceCents\":500}" \
            --accountId $MASTER \
            --networkId testnet || echo "Already initialized, skipping"

      - name: Verify deployment
        run: |
          CONTRACT_ACCOUNT="privatestream.chandanapt.testnet"
          NEAR_CLI_TESTNET_RPC_SERVER_URL=https://testnet.rpc.fastnear.com \
          near view $CONTRACT_ACCOUNT get_stats '{}' --networkId testnet
          echo ""
          echo "======================================"
          echo "CONTRACT DEPLOYED SUCCESSFULLY"
          echo "Address: $CONTRACT_ACCOUNT"
          echo "Explorer: https://testnet.nearblocks.io/address/$CONTRACT_ACCOUNT"
          echo "======================================"
