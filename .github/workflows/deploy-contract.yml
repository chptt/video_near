name: Deploy NEAR Contract

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    container:
      image: node:20-bullseye

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq curl python3 git

      - name: Install Rust + wasm32
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          . "$HOME/.cargo/env"
          rustup target add wasm32-unknown-unknown
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup pnpm
        run: |
          npm install -g pnpm@9
          pnpm config set global-bin-dir /usr/local/bin
          pnpm config set global-dir /usr/local/lib/pnpm-global

      - name: Install near-sdk-js
        run: |
          pnpm add -g near-sdk-js
          echo "near-sdk-js installed ok"

      - name: Build contract WASM
        run: |
          # Install near-sdk-js locally so the contract import resolves
          cd contracts
          npm init -y
          npm install near-sdk-js
          cd ..
          mkdir -p contracts/build
          near-sdk-js build contracts/private_stream_near.js contracts/private_stream_near.wasm
          ls -lh contracts/private_stream_near.wasm
          echo "Build complete"

      - name: Install NEAR CLI
        run: |
          npm install -g near-cli
          near --version

      - name: Setup NEAR credentials
        run: |
          mkdir -p /root/.near-credentials/testnet
          echo '${{ secrets.NEAR_CREDENTIALS }}' \
            > /root/.near-credentials/testnet/chandanapt.testnet.json
          echo '${{ secrets.NEAR_CONTRACT_CREDENTIALS }}' \
            > /root/.near-credentials/testnet/privatestream.chandanapt.testnet.json
          ls /root/.near-credentials/testnet/

      - name: Verify account balance
        run: |
          curl -s -X POST https://testnet.rpc.fastnear.com \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":"1","method":"query","params":{"request_type":"view_account","finality":"final","account_id":"chandanapt.testnet"}}' \
            | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if 'result' in d:
              bal=int(d['result']['amount'])/10**24
              print(f'Balance: {bal:.4f} NEAR')
          else:
              print('Error:',d); sys.exit(1)
          "

      - name: Deploy contract
        env:
          NEAR_CLI_TESTNET_RPC_SERVER_URL: https://testnet.rpc.fastnear.com
          HOME: /root
        run: |
          near deploy \
            --accountId privatestream.chandanapt.testnet \
            --wasmFile contracts/private_stream_near.wasm \
            --networkId testnet
          echo "Deployed: privatestream.chandanapt.testnet"

      - name: Initialize contract
        env:
          NEAR_CLI_TESTNET_RPC_SERVER_URL: https://testnet.rpc.fastnear.com
          HOME: /root
        run: |
          near call privatestream.chandanapt.testnet init \
            '{"treasuryAccount":"chandanapt.testnet","nearPriceCents":500}' \
            --accountId chandanapt.testnet \
            --networkId testnet || echo "Already initialized"

      - name: Verify deployment
        env:
          NEAR_CLI_TESTNET_RPC_SERVER_URL: https://testnet.rpc.fastnear.com
          HOME: /root
        run: |
          near view privatestream.chandanapt.testnet get_stats '{}' \
            --networkId testnet
          echo ""
          echo "======================================"
          echo "CONTRACT: privatestream.chandanapt.testnet"
          echo "EXPLORER: https://testnet.nearblocks.io/address/privatestream.chandanapt.testnet"
          echo "======================================"
