name: Deploy NEAR Contract

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust + wasm32 target
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup target add wasm32-unknown-unknown
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install near-sdk-js via pnpm
        run: |
          pnpm install -g near-sdk-js
          echo "near-sdk-js installed"

      - name: Build contract WASM
        run: |
          near-sdk-js build contracts/private_stream_near.js \
            --out contracts/private_stream_near.wasm
          echo "Build complete"
          ls -lh contracts/private_stream_near.wasm

      - name: Install NEAR CLI
        run: npm install -g near-cli

      - name: Setup NEAR credentials
        run: |
          mkdir -p ~/.near-credentials/testnet
          echo '${{ secrets.NEAR_CREDENTIALS }}' \
            > ~/.near-credentials/testnet/chandanapt.testnet.json
          echo '${{ secrets.NEAR_CONTRACT_CREDENTIALS }}' \
            > ~/.near-credentials/testnet/privatestream.chandanapt.testnet.json
          ls ~/.near-credentials/testnet/

      - name: Verify account balance
        run: |
          curl -s -X POST https://testnet.rpc.fastnear.com \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":"1","method":"query","params":{"request_type":"view_account","finality":"final","account_id":"chandanapt.testnet"}}' \
            | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if 'result' in d:
              bal=int(d['result']['amount'])/10**24
              print(f'Balance: {bal:.4f} NEAR')
          else:
              print('Error:',d); sys.exit(1)
          "

      - name: Deploy contract
        env:
          NEAR_CLI_TESTNET_RPC_SERVER_URL: https://testnet.rpc.fastnear.com
        run: |
          near deploy \
            --accountId privatestream.chandanapt.testnet \
            --wasmFile contracts/private_stream_near.wasm \
            --networkId testnet
          echo "Deployed to: privatestream.chandanapt.testnet"

      - name: Initialize contract
        env:
          NEAR_CLI_TESTNET_RPC_SERVER_URL: https://testnet.rpc.fastnear.com
        run: |
          near call privatestream.chandanapt.testnet init \
            '{"treasuryAccount":"chandanapt.testnet","nearPriceCents":500}' \
            --accountId chandanapt.testnet \
            --networkId testnet || echo "Already initialized"

      - name: Verify deployment
        env:
          NEAR_CLI_TESTNET_RPC_SERVER_URL: https://testnet.rpc.fastnear.com
        run: |
          near view privatestream.chandanapt.testnet get_stats '{}' \
            --networkId testnet
          echo "Contract: privatestream.chandanapt.testnet"
          echo "Explorer: https://testnet.nearblocks.io/address/privatestream.chandanapt.testnet"
