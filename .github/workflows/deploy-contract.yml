name: Deploy NEAR Contract

on:
  workflow_dispatch:

env:
  NEAR_RPC: https://test.rpc.fastnear.com

jobs:
  deploy:
    runs-on: ubuntu-22.04
    container:
      image: node:20-bullseye

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: apt-get update -qq && apt-get install -y -qq curl python3 git

      - name: Install Rust + wasm32
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup target add wasm32-unknown-unknown
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup pnpm
        run: |
          npm install -g pnpm@9
          pnpm config set global-bin-dir /usr/local/bin
          pnpm config set global-dir /usr/local/lib/pnpm-global

      - name: Install near-sdk-js locally in contracts/
        working-directory: contracts
        run: |
          pnpm init || true
          pnpm add near-sdk-js
          ls node_modules/near-sdk-js/lib/cli/deps/qjsc && echo "qjsc found"

      - name: Build contract WASM
        working-directory: contracts
        run: |
          mkdir -p build
          ./node_modules/.bin/near-sdk-js build \
            private_stream_near.js \
            build/private_stream_near.wasm
          ls -lh build/private_stream_near.wasm
          cp build/private_stream_near.wasm private_stream_near.wasm
          echo "WASM built successfully"

      - name: Install NEAR CLI
        run: npm install -g near-cli

      - name: Setup NEAR credentials
        run: |
          mkdir -p /root/.near-credentials/testnet
          echo '${{ secrets.NEAR_CREDENTIALS }}' \
            > /root/.near-credentials/testnet/chandanapt.testnet.json
          echo '${{ secrets.NEAR_CONTRACT_CREDENTIALS }}' \
            > /root/.near-credentials/testnet/privatestream.chandanapt.testnet.json
          chmod 600 /root/.near-credentials/testnet/*.json

      - name: Fund contract account for storage
        env:
          NEAR_CLI_TESTNET_RPC_SERVER_URL: ${{ env.NEAR_RPC }}
        run: |
          HOME=/root near send chandanapt.testnet \
            privatestream.chandanapt.testnet 3 \
            --networkId testnet || echo "Fund step done"

      - name: Deploy contract
        env:
          NEAR_CLI_TESTNET_RPC_SERVER_URL: ${{ env.NEAR_RPC }}
        run: |
          HOME=/root near deploy \
            privatestream.chandanapt.testnet \
            contracts/private_stream_near.wasm \
            --force \
            --networkId testnet
          echo "Deployed: privatestream.chandanapt.testnet"

      - name: Initialize contract (skip if already done)
        env:
          NEAR_CLI_TESTNET_RPC_SERVER_URL: ${{ env.NEAR_RPC }}
        run: |
          HOME=/root near call privatestream.chandanapt.testnet init \
            '{"treasuryAccount":"chandanapt.testnet","nearPriceCents":500}' \
            --accountId chandanapt.testnet \
            --networkId testnet || echo "Already initialized - skipping"

      - name: Delete existing test campaign (clear for fresh test)
        env:
          NEAR_CLI_TESTNET_RPC_SERVER_URL: ${{ env.NEAR_RPC }}
        run: |
          CAMPAIGN=$(HOME=/root near view privatestream.chandanapt.testnet \
            get_creator_campaign \
            '{"accountId":"chandanapt.testnet"}' \
            --networkId testnet 2>/dev/null || echo "null")
          echo "Existing campaign: $CAMPAIGN"
          CAMPAIGN_ID=$(echo "$CAMPAIGN" | grep -o '"id": *"[^"]*"' | head -1 | sed 's/"id": *"//;s/"//')
          if [ -n "$CAMPAIGN_ID" ] && [ "$CAMPAIGN_ID" != "null" ]; then
            echo "Deleting campaign: $CAMPAIGN_ID"
            HOME=/root near call privatestream.chandanapt.testnet delete_campaign \
              "{\"campaignId\":\"$CAMPAIGN_ID\"}" \
              --accountId chandanapt.testnet \
              --networkId testnet
            echo "Campaign deleted"
          else
            echo "No existing campaign to delete"
          fi

      - name: Verify deployment
        env:
          NEAR_CLI_TESTNET_RPC_SERVER_URL: ${{ env.NEAR_RPC }}
        run: |
          HOME=/root near view privatestream.chandanapt.testnet get_stats \
            '{}' --networkId testnet
          echo "CONTRACT: privatestream.chandanapt.testnet"
          echo "EXPLORER: https://testnet.nearblocks.io/address/privatestream.chandanapt.testnet"
